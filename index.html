<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinitzy — Sri Lanka's Premium Property Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --cream: #faf7f2;
      --warm: #f5efe6;
      --brown: #2c1810;
      --gold: #c9873a;
      --text: #1a1208;
      --muted: #7a6a5a;
      --border: rgba(44,24,16,0.1);
      --surface: #ffffff;
      --shadow: 0 4px 20px rgba(44,24,16,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }

    /* --- NAVIGATION --- */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--brown); cursor: pointer; }
    .logo span { color: var(--gold); }
    
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .nav-btn.ghost { background: transparent; color: var(--text); }
    .nav-btn.primary { background: var(--brown); color: #fff; }
    .nav-btn.gold { background: var(--gold); color: #fff; }
    .menu-trigger { font-size: 24px; cursor: pointer; padding: 5px; }

    /* --- SLIDE MENU --- */
    #sideMenu {
      position: fixed; right: -300px; top: 0; width: 300px; height: 100%;
      background: var(--brown); z-index: 3000; transition: 0.4s; padding: 60px 30px;
    }
    #sideMenu.open { right: 0; }
    #sideMenu a { display: block; color: #fff; text-decoration: none; font-size: 18px; margin-bottom: 20px; font-weight: 300; opacity: 0.8; }
    #sideMenu a:hover { opacity: 1; color: var(--gold); }
    .close-menu { position: absolute; top: 20px; right: 20px; color: white; cursor: pointer; font-size: 20px; }

    /* --- MODALS (Auth) --- */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 4000; display: none;
      align-items: center; justify-content: center;
    }
    .auth-card {
      background: white; width: 90%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: var(--shadow);
    }
    .auth-card h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; }
    .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); }
    .auth-toggle { font-size: 13px; color: var(--gold); text-align: center; cursor: pointer; margin-top: 10px; }

    /* --- LAYOUT --- */
    .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
    .page { display: none; min-height: calc(100vh - 70px); }
    .page.active { display: block; }

    /* --- SEARCH --- */
    .search-bar-container {
      background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow);
      border-radius: 50px; display: flex; align-items: center;
      padding: 8px 10px 8px 30px; margin-bottom: 40px;
    }
    .search-input-group { flex: 1; border-right: 1px solid var(--border); padding-right: 20px; }
    .search-input-group:last-of-type { border-right: none; }
    .search-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text); }
    .search-input-group input, .search-input-group select { border: none; outline: none; width: 100%; font-family: 'Outfit'; font-size: 14px; background: transparent; }
    .search-circle { width: 48px; height: 48px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }

    /* --- DISCOVER SECTION (Map Size Maintained) --- */
    .home-discover { display: grid; grid-template-columns: 1fr 450px; gap: 30px; height: 600px; }
    .home-map-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
    #homeMap { width: 100%; height: 100%; z-index: 1; }
    .featured-list { overflow-y: auto; padding-right: 10px; }

    /* --- CARDS --- */
    .mini-card { display: flex; gap: 15px; background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
    .mini-card:hover { transform: translateY(-3px); border-color: var(--gold); box-shadow: var(--shadow); }
    .mini-img { width: 100px; height: 85px; border-radius: 10px; background: var(--brown); background-size: cover; background-position: center; }

    /* --- POST AD --- */
    .form-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .image-upload-box { border: 2px dashed var(--gold); background: var(--cream); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; margin-bottom: 20px; }
    #imagePreviewContainer { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .preview-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }

    @media (max-width: 1000px) {
      .home-discover { grid-template-columns: 1fr; height: auto; }
      .home-map-wrap { height: 400px; }
    }
  </style>
</head>
<body>

<div id="sideMenu">
  <div class="close-menu" onclick="toggleMenu(false)">✕</div>
  <a href="#" onclick="showPage('home'); toggleMenu(false)">Home</a>
  <a href="#" onclick="showPage('browse'); toggleMenu(false)">Browse Properties</a>
  <a href="#" onclick="showPage('post'); toggleMenu(false)">Post Advertisement</a>
  <hr style="opacity: 0.2; margin-bottom: 20px;">
  <a href="#" onclick="openAuth('login'); toggleMenu(false)">Login</a>
  <a href="#" onclick="openAuth('signup'); toggleMenu(false)">Create Account</a>
</div>

<div id="authModal" class="modal-backdrop" onclick="closeAuth(event)">
  <div class="auth-card" onclick="event.stopPropagation()">
    <h2 id="authTitle">Welcome Back</h2>
    <div id="signupFields" style="display:none;">
      <input type="text" placeholder="Full Name">
    </div>
    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Password">
    <button class="nav-btn gold" style="width:100%; padding:14px; font-size:16px;">Continue</button>
    <p class="auth-toggle" id="authToggle" onclick="toggleAuthMode()">New here? Create an account</p>
  </div>
</div>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-right">
    <button class="nav-btn ghost" onclick="openAuth('login')">Login</button>
    <button class="nav-btn gold" onclick="showPage('post')">Post Ad Free</button>
    <div class="menu-trigger" onclick="toggleMenu(true)">☰</div>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="container">
    <div class="search-bar-container">
        <div class="search-input-group">
          <div class="search-label">Location</div>
          <input type="text" id="h-loc" placeholder="Which District?">
        </div>
        <div class="search-input-group">
          <div class="search-label">Property Type</div>
          <select id="h-type"><option value="All">All Types</option><option>House</option><option>Villa</option><option>Land</option></select>
        </div>
        <div class="search-circle" onclick="showPage('browse')">🔍</div>
    </div>

    <div class="home-discover">
      <div class="home-map-wrap"><div id="homeMap"></div></div>
      <div class="featured-list">
        <div class="section-header"><h2 style="font-family:'Playfair Display'; margin-bottom:15px;">Featured Properties</h2></div>
        <div id="latestHomeGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-browse" class="page">
    <div class="container">
      <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">All Listings</h2>
      <div class="grid-results" id="browseGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
    </div>
</div>

<div id="page-post" class="page">
    <div class="container">
      <div class="form-card">
        <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">Publish Your Property</h2>
        
        <div class="image-upload-box" onclick="document.getElementById('fileInput').click()">
            <p>📸 Click to Upload Photos</p>
            <input type="file" id="fileInput" hidden multiple accept="image/*" onchange="handleImageUpload(event)">
            <div id="imagePreviewContainer"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
          <div style="grid-column: span 2;"><label>Title</label><input type="text" id="p-title" placeholder="e.g. Modern Villa in Kandy"></div>
          <div><label>Price (LKR)</label><input type="number" id="p-price" placeholder="Amount"></div>
          <div><label>District</label><input type="text" id="p-dist" placeholder="e.g. Colombo"></div>
          <div style="grid-column: span 2;"><label>Category</label><select id="p-type"><option>House</option><option>Villa</option><option>Land</option></select></div>
        </div>
        <button class="submit-btn" onclick="publishAd()">Publish Property</button>
      </div>
    </div>
</div>

<script>
let listings = [
  { id: 1, title: 'Modern 3BR House', price: 28500000, type: 'House', dist: 'Colombo', lat: 6.9271, lng: 79.8612, img: 'https://images.unsplash.com/photo-1580587771525-78b9daa3b914?auto=format&fit=crop&w=400&q=80' },
  { id: 2, title: 'Ocean View Villa', price: 95000000, type: 'Villa', dist: 'Galle', lat: 6.0367, lng: 80.2170, img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80' }
];

let uploadedImages = [];
let homeMap;

// NAVIGATION & MENU
function toggleMenu(open) {
    document.getElementById('sideMenu').style.right = open ? '0px' : '-300px';
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    if(id === 'home') setTimeout(() => homeMap.invalidateSize(), 100);
    if(id === 'browse') renderBrowse();
    window.scrollTo(0,0);
}

// AUTH MODAL
function openAuth(mode) {
    document.getElementById('authModal').style.display = 'flex';
    if(mode === 'signup') toggleAuthMode(true);
}

function closeAuth(e) {
    document.getElementById('authModal').style.display = 'none';
}

function toggleAuthMode(forceSignup = false) {
    const isSignup = forceSignup || document.getElementById('authTitle').innerText === "Welcome Back";
    document.getElementById('authTitle').innerText = isSignup ? "Create Account" : "Welcome Back";
    document.getElementById('signupFields').style.display = isSignup ? "block" : "none";
    document.getElementById('authToggle').innerText = isSignup ? "Already have an account? Login" : "New here? Create an account";
}

// IMAGE UPLOAD
function handleImageUpload(event) {
    const files = event.target.files;
    const container = document.getElementById('imagePreviewContainer');
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedImages.push(e.target.result);
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img';
            container.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
}

// RENDER MAP & CARDS
function renderHome() {
    const grid = document.getElementById('latestHomeGrid');
    grid.innerHTML = listings.map(l => createCard(l)).join('');
    
    if(!homeMap) {
        homeMap = L.map('homeMap').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(homeMap);
    }
    
    listings.forEach(l => {
        L.marker([l.lat, l.lng]).addTo(homeMap).bindPopup(l.title);
    });
}

function renderBrowse() {
    document.getElementById('browseGrid').innerHTML = listings.map(l => createCard(l)).join('');
}

function createCard(l) {
    return `
    <div class="mini-card" onclick="alert('${l.title}')">
        <div class="mini-img" style="background-image: url('${l.img || ''}')"></div>
        <div class="mini-info">
            <div class="mini-price">LKR ${l.price.toLocaleString()}</div>
            <div class="mini-title">${l.title}</div>
            <div class="mini-loc">📍 ${l.dist} • ${l.type}</div>
        </div>
    </div>`;
}

function publishAd() {
    const title = document.getElementById('p-title').value;
    const price = document.getElementById('p-price').value;
    if(!title || !price) return alert("Please fill title and price");

    const newAd = {
        id: Date.now(),
        title: title,
        price: parseInt(price),
        dist: document.getElementById('p-dist').value || 'Sri Lanka',
        type: document.getElementById('p-type').value,
        img: uploadedImages[0] || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=400&q=80',
        lat: 6.9 + (Math.random() * 0.5),
        lng: 79.8 + (Math.random() * 0.5)
    };
    
    listings.unshift(newAd);
    uploadedImages = [];
    document.getElementById('imagePreviewContainer').innerHTML = "";
    alert("Listing Successful!");
    showPage('home');
    renderHome();
}

window.onload = renderHome;
</script>
</body>
</html>
