<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Sri Lanka's Premium Property Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --cream: #faf7f2;
    --brown: #2c1810;
    --gold: #c9873a;
    --gold-light: #e8a855;
    --text: #1a1208;
    --muted: #7a6a5a;
    --border: rgba(44,24,16,0.1);
    --surface: #ffffff;
    --shadow: 0 4px 20px rgba(44,24,16,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }

  /* --- NAVIGATION --- */
  nav {
    position: sticky; top: 0; z-index: 1000;
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 40px; height: 75px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--brown); cursor: pointer; }
  .logo span { color: var(--gold); }
  .nav-right { display: flex; gap: 15px; align-items: center; }
  .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Outfit'; }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-gold { background: var(--gold); color: #fff; }

  /* --- MODALS & MENU --- */
  .modal-backdrop {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 4000; display: none;
    align-items: center; justify-content: center;
  }
  .auth-card { background: white; width: 400px; padding: 40px; border-radius: 24px; position: relative; }
  #sideMenu {
    position: fixed; right: -300px; top: 0; width: 300px; height: 100%;
    background: var(--brown); z-index: 3000; transition: 0.4s; padding: 60px 30px;
  }
  #sideMenu.open { right: 0; }
  #sideMenu a { display: block; color: #fff; text-decoration: none; margin-bottom: 20px; font-size: 18px; }

  /* --- HOME LAYOUT --- */
  .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
  .page { display: none; }
  .page.active { display: block; }
  
  .home-discover { display: grid; grid-template-columns: 1fr 450px; gap: 30px; height: 600px; }
  .home-map-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
  #homeMap { width: 100%; height: 100%; z-index: 1; }
  .featured-list { overflow-y: auto; }

  /* --- PROPERTY CARDS & SLIDER --- */
  .prop-card {
    background: #fff; border-radius: 15px; border: 1px solid var(--border);
    margin-bottom: 15px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative;
  }
  .prop-card.is-featured { border: 2px solid var(--gold); box-shadow: 0 8px 25px rgba(201, 135, 58, 0.15); }
  .featured-tag { 
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: var(--gold); color: white; padding: 4px 12px; border-radius: 5px; font-size: 11px; font-weight: 700;
  }
  
  .card-img-container { height: 180px; position: relative; overflow: hidden; background: #eee; }
  .card-slider { display: flex; transition: transform 0.3s ease; height: 100%; }
  .card-slider img { min-width: 100%; height: 100%; object-fit: cover; }
  
  .slider-nav {
    position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between;
    padding: 0 10px; transform: translateY(-50%); opacity: 0; transition: 0.2s;
  }
  .prop-card:hover .slider-nav { opacity: 1; }
  .nav-arrow { width: 30px; height: 30px; border-radius: 50%; background: white; border: none; cursor: pointer; font-weight: bold; }
  
  .photo-counter {
    position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6);
    color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px;
  }

  .card-body { padding: 15px; }
  .card-price { font-family: 'Playfair Display'; font-size: 19px; font-weight: 700; color: var(--gold); }
  .card-title { font-size: 15px; font-weight: 600; margin: 4px 0; }

  /* --- POST AD & PRICING --- */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
  .price-opt { 
    border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer;
  }
  .price-opt.selected { border: 2px solid var(--gold); background: var(--cream); }
  .price-opt h4 { color: var(--gold); font-size: 18px; }

  /* --- DETAIL MODAL GALLERY --- */
  .modal-main-img { width: 100%; height: 400px; object-fit: cover; border-radius: 15px; }
  .modal-thumbs { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 10px; }
  .thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: 0.6; }
  .thumb.active { opacity: 1; border: 2px solid var(--gold); }

</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-right">
    <button class="nav-btn btn-ghost" onclick="openAuth()">Login</button>
    <button class="nav-btn btn-gold" onclick="showPage('post')">Post Ad Free</button>
    <div style="cursor:pointer; font-size:24px;" onclick="toggleMenu(true)">☰</div>
  </div>
</nav>

<div id="sideMenu">
  <div style="color:white; cursor:pointer; text-align:right;" onclick="toggleMenu(false)">✕ Close</div>
  <br>
  <a href="#" onclick="showPage('home'); toggleMenu(false)">Home</a>
  <a href="#" onclick="showPage('browse'); toggleMenu(false)">Browse All</a>
  <a href="#" onclick="showPage('post'); toggleMenu(false)">Post an Ad</a>
</div>

<div id="page-home" class="page active">
  <div class="container">
    <div class="home-discover">
      <div class="home-map-wrap"><div id="homeMap"></div></div>
      <div class="featured-list">
        <h2 style="font-family:'Playfair Display'; margin-bottom:15px;">Featured & Top Ads</h2>
        <div id="topAdsGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-post" class="page">
  <div class="container" style="max-width:800px;">
    <div style="background:white; padding:40px; border-radius:25px; box-shadow:var(--shadow);">
      <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">1. Choose Ad Type</h2>
      <div class="pricing-grid">
        <div class="price-opt selected" onclick="selectTier(this, 'free')">
          <h4>Free</h4>
          <p>Standard Listing</p>
          <p><strong>LKR 0</strong></p>
        </div>
        <div class="price-opt" onclick="selectTier(this, 'top')">
          <h4>Top Ad</h4>
          <p>Always on Top</p>
          <p><strong>LKR 2,500</strong></p>
        </div>
        <div class="price-opt" onclick="selectTier(this, 'featured')">
          <h4>Featured</h4>
          <p>Highlighted Gold</p>
          <p><strong>LKR 5,000</strong></p>
        </div>
      </div>

      <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">2. Property Details</h2>
      <input type="file" id="fileInput" multiple hidden onchange="handleImg(event)">
      <button class="nav-btn btn-ghost" style="border:1px dashed var(--gold); width:100%; padding:30px; margin-bottom:20px;" onclick="document.getElementById('fileInput').click()">📸 Click to Upload Multiple Photos</button>
      <div id="previews" style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;"></div>

      <input type="text" id="p-title" placeholder="Property Title" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
      <input type="number" id="p-price" placeholder="Price (LKR)" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
      
      <button class="nav-btn btn-gold" style="width:100%; padding:18px;" onclick="publishAd()">Publish Property</button>
    </div>
  </div>
</div>

<div id="detailModal" class="modal-backdrop" onclick="closeDetail()">
  <div class="auth-card" style="width:800px; max-width:95%; max-height:90vh; overflow-y:auto;" onclick="event.stopPropagation()">
    <img id="mainImg" class="modal-main-img" src="">
    <div id="modalThumbs" class="modal-thumbs"></div>
    <div style="padding-top:20px;">
        <h2 id="m-title" style="font-family:'Playfair Display';"></h2>
        <h3 id="m-price" style="color:var(--gold); margin:10px 0;"></h3>
        <p id="m-desc" style="color:var(--muted); line-height:1.6;"></p>
    </div>
  </div>
</div>

<script>
let listings = [
  { id: 1, title: 'Luxury 4BR Villa - Galle Fort', price: 85000000, tier: 'featured', images: ['https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=80', 'https://images.unsplash.com/photo-1580587771525-78b9daa3b914?auto=format&fit=crop&w=600&q=80'], lat: 6.0333, lng: 80.2167 },
  { id: 2, title: 'Modern Colombo 07 Apt', price: 45000000, tier: 'top', images: ['https://images.unsplash.com/photo-1600585154340-be6191da95b8?auto=format&fit=crop&w=600&q=80'], lat: 6.9128, lng: 79.8644 }
];

let currentTier = 'free';
let currentImgs = [];
let homeMap;

function toggleMenu(s) { document.getElementById('sideMenu').classList.toggle('open', s); }
function showPage(p) { 
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p==='home') setTimeout(() => homeMap.invalidateSize(), 200);
}

function selectTier(el, tier) {
    document.querySelectorAll('.price-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    currentTier = tier;
}

function handleImg(e) {
    const files = e.target.files;
    for(let f of files) {
        let r = new FileReader();
        r.onload = (ev) => {
            currentImgs.push(ev.target.result);
            document.getElementById('previews').innerHTML += `<img src="${ev.target.result}" style="width:60px; height:60px; border-radius:8px; object-fit:cover;">`;
        }
        r.readAsDataURL(f);
    }
}

function renderHome() {
    const grid = document.getElementById('topAdsGrid');
    // Sort: Featured first, then Top, then Free
    let sorted = [...listings].sort((a,b) => {
        const order = {featured: 1, top: 2, free: 3};
        return order[a.tier] - order[b.tier];
    });

    grid.innerHTML = sorted.map(l => `
        <div class="prop-card ${l.tier==='featured'?'is-featured':''}" onclick="openDetail(${l.id})">
            ${l.tier==='featured'?'<div class="featured-tag">FEATURED</div>':''}
            ${l.tier==='top'?'<div class="featured-tag" style="background:#2c1810;">TOP AD</div>':''}
            <div class="card-img-container">
                <div class="card-slider" id="slider-${l.id}">
                    ${l.images.map(img => `<img src="${img}">`).join('')}
                </div>
                <div class="slider-nav">
                    <button class="nav-arrow" onclick="event.stopPropagation(); moveSlider(${l.id}, -1)">❮</button>
                    <button class="nav-arrow" onclick="event.stopPropagation(); moveSlider(${l.id}, 1)">❯</button>
                </div>
                <div class="photo-counter">1 / ${l.images.length}</div>
            </div>
            <div class="card-body">
                <div class="card-price">LKR ${l.price.toLocaleString()}</div>
                <div class="card-title">${l.title}</div>
            </div>
        </div>
    `).join('');

    if(!homeMap) {
        homeMap = L.map('homeMap').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(homeMap);
    }
    listings.forEach(l => L.marker([l.lat, l.lng]).addTo(homeMap));
}

let sliderPos = {};
function moveSlider(id, dir) {
    const s = document.getElementById('slider-'+id);
    const count = s.children.length;
    sliderPos[id] = ((sliderPos[id] || 0) + dir + count) % count;
    s.style.transform = `translateX(-${sliderPos[id]*100}%)`;
    s.parentElement.querySelector('.photo-counter').innerText = `${sliderPos[id]+1} / ${count}`;
}

function openDetail(id) {
    const l = listings.find(x => x.id === id);
    document.getElementById('m-title').innerText = l.title;
    document.getElementById('m-price').innerText = "LKR " + l.price.toLocaleString();
    document.getElementById('m-desc').innerText = "Premium property located in " + (l.dist || 'Sri Lanka') + ". Contact for more details.";
    
    const mainImg = document.getElementById('mainImg');
    mainImg.src = l.images[0];
    
    const thumbs = document.getElementById('modalThumbs');
    thumbs.innerHTML = l.images.map((img, i) => `
        <img src="${img}" class="thumb ${i===0?'active':''}" onclick="document.getElementById('mainImg').src='${img}'; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active');">
    `).join('');
    
    document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

function publishAd() {
    const newL = {
        id: Date.now(),
        title: document.getElementById('p-title').value,
        price: parseInt(document.getElementById('p-price').value),
        tier: currentTier,
        images: currentImgs.length ? currentImgs : ['https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=400&q=80'],
        lat: 6.9 + (Math.random()*0.5),
        lng: 79.8 + (Math.random()*0.5)
    };
    listings.push(newL);
    renderHome();
    showPage('home');
}

window.onload = renderHome;
</script>
</body>
</html>
