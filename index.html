<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Full Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
/* KEEP ORIGINAL UI + ADDITIONS */
body{font-family:'Outfit',sans-serif;background:#faf7f2;margin:0}

/* NEW FEATURES */
.top-ads{display:flex;gap:10px;padding:10px;overflow:auto;background:#fff;border-bottom:1px solid #ddd}
.top-ad{min-width:220px;background:#fff7e6;border:2px solid gold;border-radius:12px;padding:10px;font-weight:600}
.featured{border:2px solid gold !important;position:relative}
.featured::after{content:'FEATURED';position:absolute;top:8px;right:8px;background:gold;padding:3px 8px;font-size:10px;border-radius:5px}
.payment-box{background:#fff;padding:20px;border-radius:12px;border:1px solid #ddd;margin-top:20px}

.card{background:#fff;margin:10px;padding:15px;border-radius:12px;border:1px solid #ddd}
</style></head>
<body><h2 style="padding:10px">🔥 Top Ads</h2>
<div class="top-ads" id="topAds"></div><h2 style="padding:10px">🏠 Listings</h2>
<div id="list"></div><h2 style="padding:10px">➕ Post Ad</h2>
<div style="padding:10px">
<input type="text" id="title" placeholder="Title"><br><br>
<input type="file" id="photos" multiple accept="image/*" capture="environment"><br><br>
<div id="preview"></div><div class="payment-box">
<h3>Choose Plan</h3>
<select id="plan">
<option value="free">Free</option>
<option value="featured">Featured (LKR 500)</option>
<option value="top">Top Ad (LKR 1000)</option>
</select>
<br><br>
<button onclick="publishAd()">Publish Ad</button>
</div>
</div><script>
let ads=[];

// IMAGE UPLOAD
document.getElementById('photos').addEventListener('change',function(e){
 let preview=document.getElementById('preview');
 preview.innerHTML='';
 Array.from(e.target.files).forEach(file=>{
   let reader=new FileReader();
   reader.onload=function(ev){
     let img=document.createElement('img');
     img.src=ev.target.result;
     img.style.width='80px';
     img.style.margin='5px';
     preview.appendChild(img);
   }
   reader.readAsDataURL(file);
 });
});

function publishAd(){
 let title=document.getElementById('title').value;
 let plan=document.getElementById('plan').value;
 
 if(!title){alert('Enter title');return;}
 
 // simulate payment
 if(plan!='free'){
   alert('Payment successful for '+plan);
 }
 
 ads.push({title,plan});
 render();
}

function render(){
 let list=document.getElementById('list');
 let top=document.getElementById('topAds');
 list.innerHTML='';
 top.innerHTML='';

 // sort priority
 let sorted=[...ads].sort((a,b)=>{
   let order={top:1,featured:2,free:3};
   return order[a.plan]-order[b.plan];
 });

 sorted.forEach(ad=>{
   let div=document.createElement('div');
   div.className='card';
   div.innerHTML=ad.title;

   if(ad.plan==='featured') div.classList.add('featured');

   if(ad.plan==='top'){
     let t=document.createElement('div');
     t.className='top-ad';
     t.innerHTML=ad.title+' ⭐';
     top.appendChild(t);
   }

   list.appendChild(div);
 });
}
</script></body>
</html>
