 
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Sri Lanka Real Estate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream: #faf7f2;
  --warm: #f5efe6;
  --brown: #2c1810;
  --gold: #c9873a;
  --gold-light: #e8a855;
  --rust: #a0522d;
  --text: #1a1208;
  --muted: #7a6a5a;
  --border: rgba(44,24,16,0.12);
  --surface: #ffffff;
  --shadow: 0 4px 24px rgba(44,24,16,0.08);
  --shadow-lg: 0 12px 48px rgba(44,24,16,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 500;
  background: rgba(250,247,242,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--brown); letter-spacing: -0.5px; }
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 6px; }
.nav-btn { padding: 8px 18px; border-radius: 8px; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.nav-btn.ghost { background: transparent; color: var(--muted); }
.nav-btn.ghost:hover { color: var(--brown); background: var(--warm); }
.nav-btn.primary { background: var(--gold); color: #fff; font-weight: 600; box-shadow: 0 2px 12px rgba(201,135,58,0.35); }
.nav-btn.primary:hover { background: var(--gold-light); transform: translateY(-1px); }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* ── BROWSE PAGE ── */
.browse-layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 64px); }

/* FILTERS SIDEBAR */
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 22px 20px;
  position: sticky; top: 64px; height: calc(100vh - 64px);
}
.sidebar-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 18px; color: var(--brown); }
.filter-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; margin-top: 18px; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.18s; background: transparent; font-family: 'Outfit', sans-serif; }
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.active { background: var(--gold); border-color: var(--gold); color: #fff; font-weight: 600; }
.range-row { display: flex; gap: 8px; }
.range-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--text); background: var(--cream); outline: none; }
.range-input:focus { border-color: var(--gold); }
.search-box { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text); background: var(--warm); outline: none; margin-bottom: 4px; }
.search-box:focus { border-color: var(--gold); background: #fff; }
.apply-btn { width: 100%; margin-top: 20px; padding: 12px; background: var(--brown); color: #fff; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.apply-btn:hover { background: var(--gold); }
.listing-count { font-size: 12px; color: var(--muted); margin-top: 14px; text-align: center; padding-top: 14px; border-top: 1px solid var(--border); }

/* MAP + CARDS */
.map-side { display: flex; flex-direction: column; }
.map-container { height: 55vh; position: relative; }
#map { width: 100%; height: 100%; }

/* CARDS LIST */
.cards-area { flex: 1; padding: 20px; overflow-y: auto; background: var(--cream); }
.cards-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.results-label { font-size: 14px; color: var(--muted); }
.results-label strong { color: var(--text); }
.sort-select { padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; background: #fff; color: var(--text); outline: none; cursor: pointer; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

/* PROPERTY CARD */
.prop-card {
  background: #fff; border-radius: 16px; overflow: hidden;
  box-shadow: var(--shadow); transition: all 0.25s; cursor: pointer;
  border: 1.5px solid transparent;
}
.prop-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--gold); }
.card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; overflow: hidden; background: var(--warm); }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; z-index: 2; }
.badge-sale { background: #e74c3c; color: #fff; }
.badge-rent { background: #2980b9; color: #fff; }
.card-body { padding: 16px; }
.card-price { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--brown); }
.card-price span { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 400; color: var(--muted); }
.card-title { font-size: 14px; font-weight: 600; margin: 4px 0 2px; color: var(--text); }
.card-loc { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
.card-specs { display: flex; gap: 14px; }
.spec { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.spec strong { color: var(--text); font-weight: 600; }

/* PHOTO BROWSER UI */
.photo-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 10px; opacity: 0; transition: opacity 0.2s; }
.modal-img:hover .photo-nav { opacity: 1; }
.photo-btn { background: rgba(255,255,255,0.8); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.photo-counter { position: absolute; bottom: 10px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; }

/* ── POST AD PAGE ── */
.post-wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }
.form-card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
.form-section-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.photo-drop { border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--warm); }
.photo-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.photo-thumb { width: 80px; height: 80px; border-radius: 10px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #e74c3c; color: #fff; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; z-index: 800; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal-box { background: #fff; border-radius: 20px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-img { height: 350px; display: flex; align-items: center; justify-content: center; position: relative; background: #eee; overflow: hidden; }
.modal-img img { width: 100%; height: 100%; object-fit: cover; }

/* SUCCESS & OTHER */
.success-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(250,247,242,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
.success-overlay.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<nav>
  <div class="logo">Infinit<span>zy</span></div>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="showPage('home')">Home</button>
    <button class="nav-btn ghost" onclick="showPage('browse')">Browse Ads</button>
    <button class="nav-btn primary" onclick="showPage('post')">+ Post Ad</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="landing-hero" style="background: linear-gradient(160deg, #2c1810 0%, #4a2c1a 40%, #2c1810 100%); padding: 90px 28px; text-align: center; color: #fff;">
    <h1>Find Your Dream Property in Sri Lanka</h1>
    <div class="hero-search" style="max-width: 600px; margin: 30px auto; display: flex; background: #fff; padding: 8px; border-radius: 14px;">
      <input type="text" id="heroSearch" placeholder="Search by city..." style="flex: 1; border: none; outline: none; padding: 10px;">
      <button class="nav-btn primary" onclick="doHeroSearch()">Search</button>
    </div>
  </div>
</div>

<div id="page-browse" class="page">
  <div class="browse-layout">
    <div class="sidebar">
        <div class="sidebar-title">🔍 Filter</div>
        <input type="text" class="search-box" id="browseSearch" placeholder="Search..." oninput="applyFilters()">
        <button class="apply-btn" onclick="resetFilters()">Reset Filters</button>
    </div>
    <div class="map-side">
      <div class="map-container"><div id="map"></div></div>
      <div class="cards-area">
        <div class="cards-grid" id="cardsGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-post" class="page">
  <div class="post-wrap">
    <div class="form-card">
      <div class="form-section-title">🏠 Property Details</div>
      <input type="text" id="f-title" placeholder="Ad Title">
      <select id="f-proptype">
          <option>House</option><option>Apartment</option><option>Land</option>
      </select>
      <input type="number" id="f-price" placeholder="Price (LKR)">
      <input type="text" id="f-city" placeholder="City">
      <textarea id="f-desc" placeholder="Description"></textarea>
      <input type="tel" id="f-phone" placeholder="Phone Number">
    </div>
    
    <div class="form-card">
      <div class="form-section-title">📸 Photos</div>
      <div class="photo-drop" onclick="document.getElementById('photoInput').click()">
        <div class="icon">📷</div>
        <p>Click to add photos</p>
        <input type="file" id="photoInput" multiple hidden onchange="handlePhotos(this.files)">
      </div>
      <div class="photo-previews" id="photoPreviews"></div>
    </div>

    <button class="submit-btn" onclick="postAd()">Publish Ad</button>
  </div>
</div>

<div id="detailModal" class="modal-bg" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-img" id="modalImgContainer">
        </div>
    <div class="modal-body" id="modalContent"></div>
  </div>
</div>

<div id="successOverlay" class="success-overlay">
  <div class="success-box" style="background:#fff; padding:40px; border-radius:20px; text-align:center;">
    <h2>Published Successfully!</h2>
    <button class="nav-btn primary" onclick="hideSuccess()">Close</button>
  </div>
</div>

<script>
// DATA
let listings = [
  { id: 1, title: 'Modern Villa', price: 45000000, type: 'For Sale', prop: 'Villa', city: 'Galle', lat: 6.0367, lng: 80.2170, photos: [], desc: 'Beautiful seaside villa.', phone: '0771234567' }
];

// PHOTO MANAGEMENT
let currentPhotos = [];
let activePhotoIndex = 0;
let activeModalListing = null;

function handlePhotos(files) {
  for (let file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentPhotos.push(e.target.result);
      renderPhotoPreviews();
    };
    reader.readAsDataURL(file);
  }
}

function renderPhotoPreviews() {
  const container = document.getElementById('photoPreviews');
  container.innerHTML = currentPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p}">
      <button class="remove" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(i) {
  currentPhotos.splice(i, 1);
  renderPhotoPreviews();
}

// NAVIGATION
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if(id === 'browse') setTimeout(() => map.invalidateSize(), 200);
}

// POST AD
function postAd() {
  const newAd = {
    id: Date.now(),
    title: document.getElementById('f-title').value,
    price: document.getElementById('f-price').value,
    prop: document.getElementById('f-proptype').value,
    city: document.getElementById('f-city').value,
    desc: document.getElementById('f-desc').value,
    phone: document.getElementById('f-phone').value,
    photos: [...currentPhotos],
    lat: 6.0 + Math.random(),
    lng: 80.0 + Math.random()
  };
  listings.unshift(newAd);
  document.getElementById('successOverlay').classList.add('show');
}

function hideSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  currentPhotos = [];
  renderPhotoPreviews();
  showPage('browse');
  applyFilters();
}

// BROWSE & MODAL
function applyFilters() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  listings.forEach(item => {
    const mainImg = item.photos.length > 0 ? `<img src="${item.photos[0]}">` : `<div style="font-size:50px">${getEmoji(item.prop)}</div>`;
    const card = document.createElement('div');
    card.className = 'prop-card';
    card.onclick = () => openModal(item);
    card.innerHTML = `
      <div class="card-img">${mainImg}</div>
      <div class="card-body">
        <div class="card-price">LKR ${item.price}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-loc">📍 ${item.city}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function getEmoji(type) {
    if(type === 'Villa') return '🏡';
    if(type === 'Land') return '🌿';
    return '🏠';
}

function openModal(item) {
  activeModalListing = item;
  activePhotoIndex = 0;
  updateModalPhoto();
  
  document.getElementById('modalContent').innerHTML = `
    <h2>${item.title}</h2>
    <p class="modal-price">LKR ${item.price}</p>
    <p class="modal-desc">${item.desc}</p>
    <div class="modal-contact">
        <button class="contact-btn call" onclick="window.location.href='tel:${item.phone}'">Call Seller</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function updateModalPhoto() {
  const container = document.getElementById('modalImgContainer');
  const hasPhotos = activeModalListing.photos.length > 0;
  const photoSrc = hasPhotos ? activeModalListing.photos[activePhotoIndex] : '';
  
  container.innerHTML = hasPhotos ? `
    <img src="${photoSrc}">
    ${activeModalListing.photos.length > 1 ? `
        <div class="photo-nav">
            <button class="photo-btn" onclick="prevPhoto(event)">❮</button>
            <button class="photo-btn" onclick="nextPhoto(event)">❯</button>
        </div>
        <div class="photo-counter">${activePhotoIndex + 1} / ${activeModalListing.photos.length}</div>
    ` : ''}
  ` : `<div style="font-size:100px">${getEmoji(activeModalListing.prop)}</div>`;
}

function nextPhoto(e) {
  e.stopPropagation();
  activePhotoIndex = (activePhotoIndex + 1) % activeModalListing.photos.length;
  updateModalPhoto();
}

function prevPhoto(e) {
  e.stopPropagation();
  activePhotoIndex = (activePhotoIndex - 1 + activeModalListing.photos.length) % activeModalListing.photos.length;
  updateModalPhoto();
}

function closeModal(e) {
  if(e.target.id === 'detailModal') document.getElementById('detailModal').classList.remove('open');
}

// MAP INIT
let map = L.map('map').setView([7.8731, 80.7718], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

applyFilters();
</script>
</body>
</html>
