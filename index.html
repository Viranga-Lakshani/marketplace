<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinitzy — Sri Lanka's Premium Property Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --cream: #faf7f2;
      --warm: #f5efe6;
      --brown: #2c1810;
      --gold: #c9873a;
      --gold-light: #e8a855;
      --text: #1a1208;
      --muted: #7a6a5a;
      --border: rgba(44,24,16,0.1);
      --surface: #ffffff;
      --shadow: 0 4px 20px rgba(44,24,16,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }

    /* --- NAVIGATION --- */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--brown); cursor: pointer; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 12px; align-items: center; }
    .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .nav-btn.ghost { background: transparent; color: var(--text); }
    .nav-btn.gold { background: var(--gold); color: #fff; }

    .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
    .page { display: none; min-height: calc(100vh - 70px); }
    .page.active { display: block; }

    /* --- HOME HERO & SEARCH --- */
    .search-bar-container {
      background: #fff; border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-radius: 50px; display: flex; align-items: center;
      padding: 8px 10px 8px 30px; margin-bottom: 40px;
    }
    .search-input-group { flex: 1; border-right: 1px solid var(--border); padding-right: 20px; }
    .search-input-group:last-of-type { border-right: none; }
    .search-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text); margin-bottom: 2px; }
    .search-input-group input, .search-input-group select { 
      border: none; outline: none; width: 100%; font-family: 'Outfit'; font-size: 14px; color: var(--muted); background: transparent;
    }
    .search-circle { 
      width: 48px; height: 48px; background: var(--gold); border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
    }

    /* --- CATEGORIES --- */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 40px;}
    .cat-item {
      text-align: center; padding: 20px 10px; border-radius: 15px;
      background: var(--cream); border: 1px solid transparent; cursor: pointer; transition: 0.2s;
    }
    .cat-item:hover { border-color: var(--gold); background: #fff; box-shadow: var(--shadow); }
    .cat-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .cat-name { font-weight: 700; font-size: 14px; color: var(--brown); }

    /* --- HOME MAP SECTION --- */
    .home-discover { display: grid; grid-template-columns: 1fr 450px; gap: 30px; height: 600px; }
    .home-map-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
    #homeMap { width: 100%; height: 100%; z-index: 1; }
    .featured-list { overflow-y: auto; padding-right: 10px; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
    .section-header h2 { font-family: 'Playfair Display'; font-size: 28px; font-weight: 800; }

    /* --- LISTING CARDS --- */
    .mini-card {
      display: flex; gap: 15px; background: #fff; padding: 12px;
      border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border);
      transition: 0.2s; cursor: pointer;
    }
    .mini-card:hover { transform: translateY(-3px); border-color: var(--gold); box-shadow: var(--shadow); }
    .mini-img { 
        width: 100px; height: 85px; border-radius: 10px; 
        background: var(--brown); background-size: cover; background-position: center;
        display: flex; align-items: center; justify-content: center; font-size: 30px; color: white;
        overflow: hidden;
    }
    .mini-img img { width: 100%; height: 100%; object-fit: cover; }
    .mini-info { flex: 1; }
    .mini-price { font-family: 'Playfair Display'; font-weight: 700; color: var(--gold); font-size: 17px; }
    .mini-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .mini-loc { font-size: 12px; color: var(--muted); }

    /* --- BROWSE PAGE --- */
    .browse-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
    .grid-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* --- POST AD SECTION --- */
    .form-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .image-upload-box {
        border: 2px dashed var(--gold); background: var(--cream);
        padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; margin-bottom: 20px;
    }
    #imagePreviewContainer { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .preview-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }
    input, select, textarea { 
        width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); 
        background: #fff; font-family: 'Outfit'; margin-top: 5px;
    }
    .submit-btn { 
        width: 100%; padding: 16px; background: var(--brown); color: #fff; 
        border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px;
    }

    @media (max-width: 1000px) {
      .home-discover, .browse-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="showPage('home')">Home</button>
    <button class="nav-btn ghost" onclick="showPage('browse')">Browse</button>
    <button class="nav-btn gold" onclick="showPage('post')">Post Ad Free</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="container">
    <div class="search-bar-container">
        <div class="search-input-group">
          <div class="search-label">Location</div>
          <input type="text" id="h-loc" placeholder="District">
        </div>
        <div class="search-input-group">
          <div class="search-label">Type</div>
          <select id="h-type"><option value="All">All Types</option><option>House</option><option>Villa</option><option>Land</option></select>
        </div>
        <div class="search-circle" onclick="showPage('browse')">🔍</div>
    </div>

    <div class="home-discover">
      <div class="home-map-wrap"><div id="homeMap"></div></div>
      <div class="featured-list">
        <div class="section-header"><h2>Premium Properties</h2></div>
        <div id="latestHomeGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-browse" class="page">
    <div class="container">
      <div class="section-header"><h2>All Listings</h2></div>
      <div class="grid-results" id="browseGrid"></div>
    </div>
</div>

<div id="page-post" class="page">
    <div class="container">
      <div class="form-card">
        <h2 style="margin-bottom:20px;">Upload Your Property</h2>
        
        <div class="image-upload-box" onclick="document.getElementById('fileInput').click()">
            <p>Click to Upload Photos</p>
            <input type="file" id="fileInput" hidden multiple accept="image/*" onchange="handleImageUpload(event)">
            <div id="imagePreviewContainer"></div>
        </div>

        <div class="form-grid">
          <div class="full-width"><label>Title</label><input type="text" id="p-title" placeholder="e.g. Modern Colombo Apartment"></div>
          <div><label>Price (LKR)</label><input type="number" id="p-price"></div>
          <div><label>District</label><input type="text" id="p-dist"></div>
          <div><label>Category</label><select id="p-type"><option>House</option><option>Villa</option><option>Land</option></select></div>
        </div>
        <button class="submit-btn" onclick="publishAd()">Publish Property</button>
      </div>
    </div>
</div>

<script>
// DATA STORAGE
let listings = [
  { id: 1, title: 'Modern 3BR House', price: 28500000, type: 'House', dist: 'Colombo', lat: 6.9271, lng: 79.8612, img: 'https://images.unsplash.com/photo-1580587771525-78b9daa3b914?auto=format&fit=crop&w=200&q=80' },
  { id: 2, title: 'Ocean View Villa', price: 95000000, type: 'Villa', dist: 'Galle', lat: 6.0367, lng: 80.2170, img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=200&q=80' }
];

let uploadedImages = [];
let homeMap;

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    if(id === 'home') renderHome();
    if(id === 'browse') renderBrowse();
    window.scrollTo(0,0);
}

// IMAGE HANDLING
function handleImageUpload(event) {
    const files = event.target.files;
    const container = document.getElementById('imagePreviewContainer');
    
    for (let file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedImages.push(e.target.result);
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img';
            container.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
}

// RENDER LOGIC
function renderHome() {
    const grid = document.getElementById('latestHomeGrid');
    grid.innerHTML = listings.map(l => createCard(l)).join('');
    
    if(!homeMap) {
        homeMap = L.map('homeMap').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(homeMap);
    }
    listings.forEach(l => L.marker([l.lat, l.lng]).addTo(homeMap));
}

function renderBrowse() {
    document.getElementById('browseGrid').innerHTML = listings.map(l => createCard(l)).join('');
}

function createCard(l) {
    return `
    <div class="mini-card" onclick="alert('${l.title}')">
        <div class="mini-img" style="background-image: url('${l.img || ''}')">
            ${!l.img ? '🏠' : ''}
        </div>
        <div class="mini-info">
            <div class="mini-price">LKR ${l.price.toLocaleString()}</div>
            <div class="mini-title">${l.title}</div>
            <div class="mini-loc">📍 ${l.dist} • ${l.type}</div>
        </div>
    </div>`;
}

function publishAd() {
    const newAd = {
        id: Date.now(),
        title: document.getElementById('p-title').value,
        price: parseInt(document.getElementById('p-price').value),
        dist: document.getElementById('p-dist').value,
        type: document.getElementById('p-type').value,
        img: uploadedImages[0] || '', // Take the first uploaded image
        lat: 6.9 + (Math.random() * 0.5),
        lng: 79.8 + (Math.random() * 0.5)
    };

    if(!newAd.title || !newAd.price) return alert("Please fill in the details");
    
    listings.unshift(newAd);
    uploadedImages = [];
    document.getElementById('imagePreviewContainer').innerHTML = "";
    alert("Listing Successful!");
    showPage('home');
}

window.onload = renderHome;
</script>
</body>
</html>
