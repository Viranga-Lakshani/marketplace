<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Sri Lanka Real Estate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream: #faf7f2; --warm: #f5efe6; --brown: #2c1810; --gold: #c9873a;
  --gold-light: #e8a855; --rust: #a0522d; --text: #1a1208; --muted: #7a6a5a;
  --border: rgba(44,24,16,0.12); --surface: #ffffff; --shadow: 0 4px 24px rgba(44,24,16,0.08);
  --shadow-lg: 0 12px 48px rgba(44,24,16,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 500; background: rgba(250,247,242,0.92);
  backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--brown); }
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 6px; }
.nav-btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.nav-btn.ghost { background: transparent; color: var(--muted); }
.nav-btn.primary { background: var(--gold); color: #fff; font-weight: 600; }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* BROWSE */
.browse-layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 64px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 22px 20px; position: sticky; top: 64px; height: calc(100vh - 64px); }
.sidebar-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.filter-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-top: 18px; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; cursor: pointer; }
.chip.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* MAP & CARDS */
.map-side { display: flex; flex-direction: column; }
.map-container { height: 55vh; }
#map { width: 100%; height: 100%; }
.cards-area { flex: 1; padding: 20px; background: var(--cream); }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

/* PROPERTY CARD */
.prop-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; border: 1.5px solid transparent; }
.prop-card:hover { transform: translateY(-4px); border-color: var(--gold); }
.card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; background-size: cover; background-position: center; }
.card-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #fff; }
.badge-sale { background: #e74c3c; } .badge-rent { background: #2980b9; }

/* FORMS */
.post-wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
.form-card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
.form-section-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group.full { grid-column: 1/-1; }
input, select, textarea { padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--cream); width: 100%; outline: none; }
input:focus { border-color: var(--gold); background: #fff; }

/* NEW PHOTO SYSTEM CSS */
.photo-drop { border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; cursor: pointer; background: var(--warm); }
.photo-drop:hover { border-color: var(--gold); background: #fff; }
.photo-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.photo-thumb { width: 85px; height: 85px; border-radius: 10px; border: 1.5px solid var(--border); position: relative; background-size: cover; background-position: center; }
.photo-thumb .remove { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: #e74c3c; color: #fff; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }

/* MODAL & SUCCESS */
.modal-bg { position: fixed; inset: 0; z-index: 800; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal-box { background: #fff; border-radius: 20px; max-width: 600px; width: 100%; overflow: hidden; position: relative; }
.modal-img { height: 300px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 80px; }
.success-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(250,247,242,0.95); display: none; align-items: center; justify-content: center; text-align: center; }
.success-overlay.show { display: flex; }

.submit-btn { width: 100%; padding: 16px; background: var(--brown); color: #fff; border: none; border-radius: 12px; font-family: 'Playfair Display'; font-size: 18px; cursor: pointer; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--brown); color: #fff; padding: 14px 20px; border-radius: 12px; opacity: 0; transition: 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<nav>
  <div class="logo">Infinit<span>zy</span></div>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="showPage('home')">Home</button>
    <button class="nav-btn ghost" onclick="showPage('browse')">Browse Ads</button>
    <button class="nav-btn primary" onclick="showPage('post')">+ Post Ad</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div style="background: var(--brown); padding: 100px 20px; text-align: center; color: #fff;">
    <h1 style="font-family: 'Playfair Display'; font-size: 48px;">Property in <em>Sri Lanka</em></h1>
    <button class="nav-btn primary" style="margin-top: 30px;" onclick="showPage('browse')">Start Exploring</button>
  </div>
</div>

<div id="page-browse" class="page">
  <div class="browse-layout">
    <div class="sidebar">
      <div class="sidebar-title">🔍 Filters</div>
      <input type="text" id="browseSearch" class="search-box" placeholder="Search location..." oninput="applyFilters()">
      <div class="filter-label">District</div>
      <div class="filter-chips">
        <div class="chip active" onclick="toggleChip(this,'dist')">All</div>
        <div class="chip" onclick="toggleChip(this,'dist')">Colombo</div>
        <div class="chip" onclick="toggleChip(this,'dist')">Galle</div>
        <div class="chip" onclick="toggleChip(this,'dist')">Kandy</div>
      </div>
    </div>
    <div class="map-side">
      <div class="map-container"><div id="map"></div></div>
      <div class="cards-area">
        <div class="cards-grid" id="cardsGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-post" class="page">
  <div class="post-wrap">
    <div class="form-card">
      <div class="form-section-title">🏠 Listing Basics</div>
      <div class="form-grid">
        <div class="form-group full"><label>Title *</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Type</label>
          <select id="f-proptype"><option>House</option><option>Apartment</option><option>Land</option><option>Villa</option></select>
        </div>
        <div class="form-group"><label>Price (LKR)</label><input type="number" id="f-price"></div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-section-title">📍 Location</div>
      <select id="f-district" onchange="updateMapPin()">
        <option>Colombo</option><option>Galle</option><option>Kandy</option><option>Matara</option>
      </select>
      <div id="postMap" style="height: 250px; margin-top: 15px; border-radius: 12px;"></div>
      <input type="hidden" id="f-lat" value="6.9271"><input type="hidden" id="f-lng" value="79.8612">
    </div>

    <div class="form-card">
      <div class="form-section-title">📷 Property Photos</div>
      <input type="file" id="real-file-input" accept="image/*" multiple style="display: none;">
      
      <div class="photo-drop" onclick="document.getElementById('real-file-input').click()">
        <div class="icon">📸</div>
        <p>Tap to <strong>browse gallery</strong></p>
        <p style="font-size:12px; margin-top:5px;">Select up to 10 photos</p>
      </div>
      <div class="photo-previews" id="photoPreviews"></div>
    </div>

    <div class="form-card">
      <div class="form-grid">
        <div class="form-group"><label>Seller Name</label><input type="text" id="f-name"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="f-phone"></div>
      </div>
    </div>

    <button class="submit-btn" onclick="submitAd()">Publish My Ad</button>
  </div>
</div>

<div class="modal-bg" id="detailModal">
  <div class="modal-box">
    <button style="position:absolute; top:15px; right:15px; z-index:10; border:none; background:#fff; width:30px; height:30px; border-radius:50%; cursor:pointer;" onclick="closeModal()">✕</button>
    <div class="modal-img" id="modal-img"></div>
    <div style="padding: 25px;">
      <h2 id="modal-title"></h2>
      <div id="modal-price" style="font-size:24px; color:var(--gold); font-weight:700; margin: 10px 0;"></div>
      <p id="modal-desc" style="color:var(--muted); line-height:1.6;"></p>
      <button class="submit-btn" style="margin-top:20px;" id="modal-call">Call Seller</button>
    </div>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div>
    <h1 style="font-size: 60px;">🎉</h1>
    <h2>Ad Published!</h2>
    <button class="nav-btn primary" onclick="location.reload()">Back to Home</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let listings = [
  { id:1, title:'Modern 3BR House', price:28500000, propType:'House', district:'Colombo', lat:6.9028, lng:79.8668, imgs:[] },
  { id:2, title:'Ocean View Villa', price:95000000, propType:'Villa', district:'Galle', lat:6.0109, lng:80.2486, imgs:[] }
];

let activeFilters = { dist:'All', search:'' };
let map, postMap, postMarker, markers = [];
let currentUploadedImgs = []; // To store local base64 images

// --- PHOTO BROWSING LOGIC ---
const fileBtn = document.getElementById('real-file-input');
const previewArea = document.getElementById('photoPreviews');

fileBtn.addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  
  files.forEach(file => {
    if (currentUploadedImgs.length >= 10) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      currentUploadedImgs.push(event.target.result);
      renderPhotoUI();
    };
    reader.readAsDataURL(file);
  });
});

function renderPhotoUI() {
  previewArea.innerHTML = currentUploadedImgs.map((src, i) => `
    <div class="photo-thumb" style="background-image: url(${src})">
      <button class="remove" onclick="removeImg(${i})">✕</button>
    </div>
  `).join('');
}

function removeImg(index) {
  currentUploadedImgs.splice(index, 1);
  renderPhotoUI();
}

// --- CORE NAVIGATION ---
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if (id === 'browse') setTimeout(initMap, 100);
  if (id === 'post') setTimeout(initPostMap, 100);
}

// --- MAPS ---
function initMap() {
  if (map) return;
  map = L.map('map').setView([7.8731, 80.7718], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  renderAll();
}

function initPostMap() {
  if (postMap) return;
  postMap = L.map('postMap').setView([6.9271, 79.8612], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(postMap);
  postMarker = L.marker([6.9271, 79.8612], {draggable:true}).addTo(postMap);
  postMarker.on('dragend', () => {
    const p = postMarker.getLatLng();
    document.getElementById('f-lat').value = p.lat;
    document.getElementById('f-lng').value = p.lng;
  });
}

function updateMapPin() {
  const d = document.getElementById('f-district').value;
  const coords = d === 'Galle' ? [6.0535, 80.2210] : d === 'Kandy' ? [7.2906, 80.6337] : [6.9271, 79.8612];
  postMap.setView(coords, 12);
  postMarker.setLatLng(coords);
}

// --- RENDER & FILTER ---
function toggleChip(el, grp) {
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilters.dist = el.textContent;
  renderAll();
}

function applyFilters() {
  activeFilters.search = document.getElementById('browseSearch').value.toLowerCase();
  renderAll();
}

function renderAll() {
  const filtered = listings.filter(l => {
    const mDist = activeFilters.dist === 'All' || l.district === activeFilters.dist;
    const mSearch = l.title.toLowerCase().includes(activeFilters.search);
    return mDist && mSearch;
  });

  document.getElementById('cardsGrid').innerHTML = filtered.map(l => `
    <div class="prop-card" onclick="openDetail(${l.id})">
      <div class="card-img" style="background-image: url(${l.imgs[0] || ''}); background-color: #2c1810">
        ${!l.imgs[0] ? '🏠' : ''}
        <div class="card-badge badge-sale">For Sale</div>
      </div>
      <div class="card-body" style="padding:15px">
        <div style="font-weight:700; color:var(--gold)">LKR ${l.price.toLocaleString()}</div>
        <div style="font-weight:600; font-size:14px; margin-top:5px">${l.title}</div>
        <div style="font-size:12px; color:var(--muted)">📍 ${l.district}</div>
      </div>
    </div>
  `).join('');

  markers.forEach(m => map.removeLayer(m));
  markers = filtered.map(l => L.marker([l.lat, l.lng]).addTo(map).bindPopup(l.title));
}

// --- MODAL ---
function openDetail(id) {
  const l = listings.find(x => x.id === id);
  const modal = document.getElementById('detailModal');
  const imgDiv = document.getElementById('modal-img');
  
  imgDiv.style.backgroundImage = l.imgs[0] ? `url(${l.imgs[0]})` : 'none';
  imgDiv.textContent = l.imgs[0] ? '' : '🏠';
  document.getElementById('modal-title').textContent = l.title;
  document.getElementById('modal-price').textContent = "LKR " + l.price.toLocaleString();
  document.getElementById('modal-desc').textContent = "This property is located in " + l.district + ". Contact the seller for full details and viewing.";
  
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

// --- SUBMIT ---
function submitAd() {
  const title = document.getElementById('f-title').value;
  const price = document.getElementById('f-price').value;
  if (!title || !price) return showToast("Please fill in title and price");

  const newAd = {
    id: Date.now(),
    title: title,
    price: parseInt(price),
    propType: document.getElementById('f-proptype').value,
    district: document.getElementById('f-district').value,
    lat: parseFloat(document.getElementById('f-lat').value),
    lng: parseFloat(document.getElementById('f-lng').value),
    imgs: [...currentUploadedImgs] // This captures your browsed photos!
  };

  listings.unshift(newAd);
  document.getElementById('successOverlay').classList.add('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
